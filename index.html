<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monochrome Chromium UI Concept</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar glass">
        <div class="logo">◼</div>
        <button class="side-btn active" title="New tab">＋</button>
        <button class="side-btn" title="History">🕘</button>
        <button class="side-btn" title="Bookmarks">★</button>
        <button class="side-btn" title="Downloads">⬇</button>
        <div class="spacer"></div>
        <button class="side-btn" title="Settings">⚙</button>
      </aside>

      <main class="browser-panel glass">
        <header class="titlebar">
          <div class="window-controls">
            <span></span><span></span><span></span>
          </div>
          <div class="tab-strip" id="tabStrip">
            <button class="tab active">New Tab</button>
            <button class="tab">Design Gallery</button>
            <button class="tab">Docs</button>
          </div>
        </header>

        <section class="toolbar">
          <div class="nav-buttons">
            <button>←</button>
            <button>→</button>
            <button>⟳</button>
          </div>
          <label class="omnibox">
            <span>🔎</span>
            <input id="urlInput" type="text" value="https://www.chromium.org" />
            <kbd>Ctrl+L</kbd>
          </label>
          <button class="action-btn">⤴</button>
          <button class="action-btn">☰</button>
        </section>

        <section class="content-frame">
          <div class="hero-card">
            <p class="eyebrow">Custom Chromium Concept</p>
            <h1>Carbon UI</h1>
            <p>
              A futuristic monochrome browser shell with stacked tabs,
              floating controls, and a minimal command-space aesthetic.
            </p>
            <div class="chips">
              <span>Grey</span>
              <span>White</span>
              <span>Black</span>
            </div>
          </div>

          <div class="quick-grid" id="quickGrid"></div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
